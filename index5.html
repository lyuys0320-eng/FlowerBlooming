<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>春天</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>
  <style>
    body { 
      margin: 0; 
      padding: 0; 
      overflow: hidden; 
      background-color: #dee7f2; 
    }
  </style>
</head>
<body>
  <script>
    // ================= 1. 全局变量定义 =================
    let imgs = []; 
    let currentImgIdx = 0;
    let flowers = []; 
    let butterflies = []; 
    
    let song, fft;
    let isPlaying = false;
    let soundLoaded = false; 
    let maxFlowers = 80;

    let frameX, frameY, frameSize;
    let imgW, imgH, imgLeft, imgRight, imgBottom;
    let imgOffsetY;

    let vineDistance = 0; 
    let maxVineDist; 
    let vineNodes = []; 
    let littleFlowers = [];

    let lastBassEnergy = 0; 
    let lastMidEnergy = 0; 
    let beatSensBass = 30; 
    let beatSensMid = 22;  
    let nextImageCooldownFrames = 0; 

    // ================= 歌词数据 =================
    // 请根据你的实际音乐节拍修改 time (秒)、jp (日文)、cn (中文)
    // ================= 歌词数据 =================
    // 已经将分:秒转换为了计算机能识别的纯秒数
    let lyrics = [
      { time: 0,      jp: "", cn: "" }, // 前奏留白
      { time: 14.8,   jp: "昨日の震えを 脱ぎ捨てていく", cn: "褪去昨日的颤抖" },
      { time: 21.0,   jp: "昨日の震えを 脱ぎ捨てていく", cn: "褪去昨日的颤抖" },
      { time: 27.0,   jp: "新芽の呼吸が 耳をくすぐる", cn: "新芽的呼吸 轻轻掠过耳畔" },
      { time: 33.0,   jp: "透明な水が 足跡を消して", cn: "透明的水流 抹去了旧日的足迹" },
      { time: 39.0,   jp: "透明な水が 足跡を消して", cn: "透明的水流 抹去了旧日的足迹" },
      { time: 45.0,   jp: "柔らかな予感 満ちていく", cn: "柔和的预感 渐渐充盈心间" },
      { time: 51.7,   jp: "あの日止まった 時計の音が", cn: "那天停止转动的 钟表声" },
      { time: 54.5,   jp: "今 風に溶けて 回りだす", cn: "如今 溶于风中 再次开始转动" },
      { time: 57.5,   jp: "昨日の震えを 脱ぎ捨てていく", cn: "褪去昨日的颤抖" },
      { time: 60.5,   jp: "昨日の震えを 脱ぎ捨てていく", cn: "褪去昨日的颤抖" },
      { time: 63.5,   jp: "光の渦へ 飛び込んで", cn: "跃入那光芒四射的漩涡之中" },
      { time: 66.5,   jp: "", cn: "" }, // 间奏留白
      { time: 81.2,   jp: "土の底から 囁きがして", cn: "从泥土深处 传来阵阵低语" },
      { time: 88.0,   jp: "忘れていた夢 呼び覚ます", cn: "唤醒了 那些被遗忘的梦想" },
      { time: 95.0,   jp: "昨日の震えを 脱ぎ捨てていく", cn: "褪去昨日的颤抖" },
      { time: 102.0,  jp: "昨日の震えを 脱ぎ捨てていく", cn: "褪去昨日的颤抖" },
      { time: 109.0,  jp: "重い扉を 開ける音", cn: "那是 开启沉重门扉的声音" },
      { time: 118.1,  jp: "あの日止まった 時計の音が", cn: "那天停止转动的 钟表声" },
      { time: 121.0,  jp: "あの日止まった 時計の音が", cn: "那天停止转动的 钟表声" },
      { time: 124.0,  jp: "今 風に溶けて 回りだす", cn: "如今 溶于风中 再次开始转动" },
      { time: 127.0,  jp: "柔らかな予感 満ちていく", cn: "柔和的预感 渐渐充盈心间" },
      { time: 130.0,  jp: "光の渦へ 飛び込んで", cn: "跃入那光芒四射的漩涡之中" },
      { time: 132.9,  jp: "満ちていく...", cn: "渐渐充盈……" },
      { time: 140.0,  jp: "満ちていく...", cn: "渐渐充盈……" },
      { time: 145.0,  jp: "", cn: "" } // 尾声留白
    ];

    // ================= 2. 预加载资源 =================
    function preload() {
      for (let i = 1; i <= 10; i++) {
        imgs.push(loadImage(i + '.png'));
      }
      song = loadSound('kaze_ni_tokete.mp3', () => {
        soundLoaded = true;
      }); 
    }

    // ================= 3. 初始化设置 =================
    function setup() {
      createCanvas(windowWidth, windowHeight);
      imageMode(CENTER);
      fft = new p5.FFT(0.8, 64);
      calculateLayout();
      textFont('"Kaiti", "楷体", "STKaiti", "YuYuan", cursive'); 
    }

    // 计算排版位置
    function calculateLayout() {
      frameSize = min(windowWidth, windowHeight) * 0.75;
      frameX = (windowWidth - frameSize) / 2;
      frameY = (windowHeight - frameSize) / 2;

      if (imgs.length > 0) {
        imgH = frameSize * 0.6;
        let aspectRatio = imgs[0].width / imgs[0].height;
        imgW = imgH * aspectRatio;
        
        // 图片往上挪，给下方的歌词和花朵腾出空间
        imgOffsetY = frameSize * 0.13; 
        
        imgLeft = windowWidth / 2 - imgW / 2;
        imgRight = windowWidth / 2 + imgW / 2;
        imgBottom = (windowHeight / 2 - imgOffsetY) + imgH / 2; 
      }
      maxVineDist = frameSize * 1.5;
    }

    // ================= 4. 主渲染循环 =================
    function draw() {
      background(242, 230, 222);

      let trebleEnergy = 0;
      let midEnergy = 0;
      let bassEnergy = 0;

      if (isPlaying) {
        fft.analyze();
        trebleEnergy = fft.getEnergy("treble");
        midEnergy = fft.getEnergy("mid");
        bassEnergy = fft.getEnergy("bass");

        if (nextImageCooldownFrames > 0) nextImageCooldownFrames--;

        let midSpike = midEnergy - lastMidEnergy;
        let bassSpike = bassEnergy - lastBassEnergy;

        if ((midSpike > beatSensMid || bassSpike > beatSensBass) && nextImageCooldownFrames === 0) { 
          let nextIdx;
          do { nextIdx = floor(random(imgs.length)); } while (nextIdx === currentImgIdx);
          currentImgIdx = nextIdx;
          
          growVines(18);
          if (flowers.length < maxFlowers) spawnGrowingFlower(true); 

          nextImageCooldownFrames = 12; 
        }

        lastBassEnergy = bassEnergy;
        lastMidEnergy = midEnergy;

        if (trebleEnergy > 70 && frameCount % 12 === 0) {
          if (flowers.length < maxFlowers) spawnGrowingFlower(false); 
          else growVines(6);
        }
      }

      // --- [绘制图层 1] 底层女孩图片 ---
      if (imgs[currentImgIdx]) {
        push();
        let s = 1 + map(bassEnergy, 0, 255, 0, 0.04);
        scale(s);
        image(imgs[currentImgIdx], (windowWidth / 2) / s, (windowHeight / 2 - imgOffsetY) / s, imgW, imgH);
        pop();
      }

      // --- [绘制图层 2] 律动手绘风格边框 ---
      drawHandDrawnFrame(bassEnergy);

      // --- [绘制图层 3] 中景：藤蔓与碎花 ---
      drawVines();
      for (let lf of littleFlowers) {
        lf.update(midEnergy); 
        lf.display();
      }

      // --- [绘制图层 4] 【修改】固定位置、随时间切换的歌词 ---
      drawStaticLyrics();

      // --- [绘制图层 5] 前景：主花朵 ---
      for (let f of flowers) {
        f.update(midEnergy); 
        f.display();
      }

      // --- [绘制图层 6] 顶层：魔法幻蝶 ---
      handleButterflies();

      // --- [界面提示] 未播放状态的 UI ---
      if (!isPlaying) {
        fill(180, 160, 150);
        textSize(16); 
        textAlign(CENTER);
        if (!soundLoaded) {
          text("音乐努力读取中，请稍候...\n(若卡顿请通过 Live Server 运行以解除浏览器拦截)", windowWidth / 2, windowHeight - 40);
        } else {
          text("🎵 音乐已就绪！轻触屏幕开启梦境", windowWidth / 2, windowHeight - 30);
        }
      }
    }

    // ================= 5. 核心功能函数 =================

    // 【修改】绘制静态随动歌词
    // 【修改】绘制静态随动歌词，增加间奏留白判定
    function drawStaticLyrics() {
      if (!isPlaying) return;
      
      let currentT = song.currentTime();
      let currentLyric = null;
      
      // 倒序遍历，找到当前时间点对应的歌词
      for (let i = lyrics.length - 1; i >= 0; i--) {
        if (currentT >= lyrics[i].time) {
          currentLyric = lyrics[i];
          break;
        }
      }

      // 只有当存在当前歌词，且日文文本不为空（不是间奏/前奏）时，才绘制文字
      if (currentLyric && currentLyric.jp !== "") {
        push();
        textAlign(CENTER, CENTER);
        noStroke(); // 绝对不要外轮廓
        
        // 中灰色 (微带一点点暖色调以融合背景)
        fill(115, 110, 105); 
        
        // 计算Y轴位置：放在图片底部 (imgBottom) 和画框底部 (frameY + frameSize) 的正中间
        let gapTop = imgBottom;
        let gapBottom = frameY + frameSize;
        let lyricY = (gapTop + gapBottom) / 2.2;

        // 画日文（主歌词，大一点）
        textSize(21); 
        text(currentLyric.jp, windowWidth / 2, lyricY - 15);
        
        // 画中文（翻译，稍微小一点）
        textSize(18); 
        text(currentLyric.cn, windowWidth / 2, lyricY + 22);
        
        pop();
      }
    }

    function drawHandDrawnFrame(energy) {
      push();
      noFill();
      stroke(170, 150, 140, 180);
      strokeWeight(map(energy, 0, 255, 1.2, 3.2)); 
      let distortion = map(energy, 0, 255, 3, 16); 
      let segments = 12;
      let t = frameCount * 0.02;

      beginShape();
      for(let i = 0; i <= segments; i++) vertex(lerp(frameX, frameX + frameSize, i/segments), frameY + (noise(t + i*0.5) - 0.5) * distortion); 
      for(let i = 1; i <= segments; i++) vertex(frameX + frameSize + (noise(t + i*0.5 + 50) - 0.5) * distortion, lerp(frameY, frameY + frameSize, i/segments)); 
      for(let i = 1; i <= segments; i++) vertex(lerp(frameX + frameSize, frameX, i/segments), frameY + frameSize + (noise(t + i*0.5 + 100) - 0.5) * distortion); 
      for(let i = 1; i < segments; i++) vertex(frameX + (noise(t + i*0.5 + 150) - 0.5) * distortion, lerp(frameY + frameSize, frameY, i/segments)); 
      endShape(CLOSE);
      pop();
    }

    function spawnGrowingFlower(isBeat) {
      let startX = random(frameX + 10, frameX + frameSize - 10);
      let targetH;
      
      let isInCenter = (startX > imgLeft +15 && startX < imgRight - 15);
      if (isInCenter) {
        let distToImgBottom = (frameY + frameSize) - imgBottom;
        targetH = random(distToImgBottom * 0.12, distToImgBottom * 0.6); 
      } else {
        targetH = random(frameSize * 0.3, frameSize * 1.1);
      }
      
      if (isBeat && random() > 0.8 && !isInCenter) {
          targetH = frameSize * 0.8;
      }
      flowers.push(new GrowingFlower(startX, frameY + frameSize, targetH));
    }

    function growVines(step) {
      if (vineDistance < maxVineDist) {
        vineDistance += step;
        let leftNode = getVinePos(frameX, vineDistance, 1);
        let rightNode = getVinePos(frameX + frameSize, vineDistance, -1);
        vineNodes.push({lx: leftNode.x, ly: leftNode.y, rx: rightNode.x, ry: rightNode.y});
        
        if (random() > 0.4) {
          littleFlowers.push(new LittleFlower(leftNode.x + random(-15, 15), leftNode.y + random(-15, 15)));
          littleFlowers.push(new LittleFlower(rightNode.x + random(-15, 15), rightNode.y + random(-15, 15)));
        }
      }
    }

    function getVinePos(startX, dist, dir) {
      if (dist <= frameSize) return { x: startX + random(-3,3), y: (frameY + frameSize) - dist };
      else return { x: startX + ((dist - frameSize) * dir), y: frameY + random(-3,3) };
    }

    function drawVines() {
      noFill(); 
      stroke(110, 145, 175, 180); 
      strokeWeight(2.2);
      beginShape(); for(let n of vineNodes) vertex(n.lx, n.ly); endShape();
      beginShape(); for(let n of vineNodes) vertex(n.rx, n.ry); endShape();
    }

    // ================= 6. 对象类定义 =================

    class GrowingFlower {
      constructor(x, baseY, targetHeight) {
        this.x = x; 
        this.baseY = baseY; 
        this.targetHeight = targetHeight;
        this.currentHeight = 0; 
        
        this.flowerSize = random(10, 32); 
        this.petalCount = floor(random(5, 7));
        this.flowerColor = random([color(245, 172, 183, 230), color(255, 218, 171, 230), color(245, 150, 112, 230)]);
        this.swayOffset = random(TWO_PI);
        
        this.stemWidth = map(this.flowerSize, 10, 32, 1.8, 3.8); 
        this.stemColor = color(130, 180, 140, 210);
        this.leaf1Pos = random(0.2, 0.4); 
        this.leaf2Pos = random(0.6, 0.8); 
      }
      update(energy) {
        let speed = map(energy, 0, 255, 1.5, 6); 
        if (this.currentHeight < this.targetHeight) this.currentHeight += speed;
        this.angle = sin(frameCount * 0.05 + this.swayOffset) * map(energy, 0, 255, 0.03, 0.18);
      }
      display() {
        push();
        translate(this.x, this.baseY); 
        rotate(this.angle);
        
        stroke(this.stemColor); 
        strokeCap(SQUARE);
        strokeWeight(this.stemWidth);
        line(0, 0, 0, -this.currentHeight);
        
        noStroke(); 
        fill(110, 160, 120, 220);
        let leafS = this.stemWidth * 3.8; 
        if (this.currentHeight > this.targetHeight * this.leaf1Pos) {
          push(); 
          translate(this.stemWidth/2, -this.targetHeight * this.leaf1Pos); 
          rotate(this.angle * 2 + PI/6); 
          ellipse(leafS/2, 0, leafS, leafS/2); 
          pop();
        }
        if (this.currentHeight > this.targetHeight * this.leaf2Pos) {
          push(); 
          translate(-this.stemWidth/2, -this.targetHeight * this.leaf2Pos); 
          rotate(this.angle * 2 - PI/6); 
          ellipse(-leafS/2, 0, leafS, leafS/2); 
          pop();
        }
        
        if (this.currentHeight > this.targetHeight - 5) {
          translate(0, -this.currentHeight); 
          noStroke(); 
          fill(this.flowerColor);
          for (let a = 0; a < TWO_PI; a += TWO_PI/this.petalCount) {
            push(); 
            rotate(a); 
            ellipse(0, -this.flowerSize/3, this.flowerSize*0.55, this.flowerSize*0.95); 
            pop();
          }
          fill(255, 240, 150, 240); 
          circle(0, 0, this.flowerSize*0.38); 
        }
        pop();
      }
    }

    class LittleFlower {
      constructor(x, y) { 
        this.x = x; 
        this.y = y; 
        this.size = 0; 
        this.maxS = random(8, 16); 
        this.rot = random(TWO_PI);
      } 
      update(energy) { 
        let speed = map(energy, 0, 255, 0.2, 1.0);
        if (this.size < this.maxS) this.size += speed; 
      }
      display() {
        if (this.size < 1) return;
        push(); 
        translate(this.x, this.y); 
        rotate(this.rot + this.size * 0.05); 
        noStroke(); 
        fill(255, 252, 245, 240); 
        let s = this.size;
        ellipse(-s/3, 0, s, s*0.6); 
        ellipse(s/3, 0, s, s*0.6); 
        ellipse(0, -s/3, s*0.6, s); 
        ellipse(0, s/3, s*0.6, s); 
        fill(255, 200, 100, 240); 
        circle(0, 0, s * 0.4);
        pop();
      }
    }

    class Butterfly {
      constructor(x, y) {
        this.x = x; 
        this.y = y; 
        this.alpha = 255;
        this.vx = random(-1.2, 1.2); 
        this.vy = random(-1.2, -2.8);
      }
      update() { 
        this.x += this.vx + sin(frameCount*0.1)*0.5; 
        this.y += this.vy; 
        this.alpha -= 2.2; 
      }
      display() {
        fill(255, 230, 100, this.alpha); 
        noStroke();
        let s = map(this.alpha, 255, 0, 10, 2); 
        circle(this.x, this.y, s);
      }
      isDead() { return this.alpha <= 0; }
    }

    function handleButterflies() {
      if (movedX !== 0 && frameCount % 10 === 0) butterflies.push(new Butterfly(mouseX, mouseY));
      for (let i = butterflies.length - 1; i >= 0; i--) {
        butterflies[i].update(); 
        butterflies[i].display();
        if (butterflies[i].isDead()) butterflies.splice(i, 1);
      }
    }

    // ================= 7. 交互事件 =================
    function mousePressed() {
      if (soundLoaded) {
        if (!song.isPlaying()) { 
          song.play(); 
          isPlaying = true; 
        } else { 
          song.pause(); 
          isPlaying = false; 
        }
      }
    }

    function windowResized() { 
      resizeCanvas(windowWidth, windowHeight); 
      calculateLayout(); 
    }
  </script>
</body>
</html>
